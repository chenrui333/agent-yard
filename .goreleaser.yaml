version: 2

project_name: yard

before:
  hooks:
    - go mod download

builds:
  - id: yard
    main: ./cmd/yard
    binary: yard
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: yard
    ids:
      - yard
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - CHANGELOG.md
      - RELEASE.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: chenrui333
    name: agent-yard
  draft: false
  replace_existing_draft: false
  replace_existing_artifacts: false
  prerelease: auto
  make_latest: true
  mode: keep-existing
